<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8634a"/>
      <stop offset="100%" stop-color="#f09a5b"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="url(#bg)"/>

  <!-- Neural connections (lines) -->
  <g stroke="url(#accent)" stroke-width="1.5" stroke-opacity="0.4" fill="none">
    <line x1="64" y1="40" x2="42" y2="58"/>
    <line x1="64" y1="40" x2="86" y2="58"/>
    <line x1="42" y1="58" x2="38" y2="80"/>
    <line x1="42" y1="58" x2="58" y2="78"/>
    <line x1="86" y1="58" x2="90" y2="80"/>
    <line x1="86" y1="58" x2="70" y2="78"/>
    <line x1="58" y1="78" x2="70" y2="78"/>
    <line x1="38" y1="80" x2="58" y2="78"/>
    <line x1="90" y1="80" x2="70" y2="78"/>
    <line x1="64" y1="40" x2="58" y2="78"/>
    <line x1="64" y1="40" x2="70" y2="78"/>
    <line x1="42" y1="58" x2="86" y2="58"/>
  </g>

  <!-- Brain outline (simplified, two hemispheres) -->
  <g fill="none" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left hemisphere -->
    <path d="M62,32 C48,32 34,42 34,58 C34,68 38,76 42,82 C46,88 54,92 62,92"/>
    <!-- Right hemisphere -->
    <path d="M66,32 C80,32 94,42 94,58 C94,68 90,76 86,82 C82,88 74,92 66,92"/>
    <!-- Central fissure -->
    <line x1="64" y1="32" x2="64" y2="92" stroke-opacity="0.5" stroke-width="1.5"/>
  </g>

  <!-- Neural nodes -->
  <g fill="url(#accent)">
    <circle cx="64" cy="40" r="4"/>
    <circle cx="42" cy="58" r="3"/>
    <circle cx="86" cy="58" r="3"/>
    <circle cx="38" cy="80" r="2.5"/>
    <circle cx="58" cy="78" r="3"/>
    <circle cx="70" cy="78" r="3"/>
    <circle cx="90" cy="80" r="2.5"/>
  </g>

  <!-- Small connectivity dots at the edges (signal points) -->
  <g fill="#f09a5b" opacity="0.6">
    <circle cx="34" cy="58" r="1.5"/>
    <circle cx="94" cy="58" r="1.5"/>
    <circle cx="64" cy="92" r="1.5"/>
    <circle cx="64" cy="32" r="1.5"/>
  </g>
</svg>
